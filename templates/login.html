{% extends "base.html" %}

{% block title %}Log in | PhishGuard{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)] py-12 px-4 sm:px-6 lg:px-8 relative">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    
    <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white tracking-tight">Welcome back</h2>
            <p class="text-slate-400 mt-2 text-sm">Sign in to your account</p>
        </div>

        <div id="error-alert" class="hidden mb-4 p-3 rounded-lg bg-rose-500/20 border border-rose-500/50 text-rose-400 text-sm">
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input id="username" name="username" type="text" required class="w-full px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-white placeholder-slate-500 transition-all outline-none" placeholder="Enter username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input id="password" name="password" type="password" required class="w-full px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-white placeholder-slate-500 transition-all outline-none" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold text-slate-900 bg-cyan-400 hover:bg-cyan-300 hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all duration-300">
                Sign in
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-400">
            Don't have an account? <a href="/register" class="text-cyan-400 hover:text-cyan-300 font-medium">Sign up</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorAlert = document.getElementById('error-alert');
        
        try {
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            const res = await fetch('/auth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } else {
                const data = await res.json();
                errorAlert.textContent = data.detail || 'Invalid credentials';
                errorAlert.classList.remove('hidden');
            }
        } catch (err) {
            errorAlert.textContent = 'Server error. Please try again.';
            errorAlert.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
