syntax = "proto3";

package analyzer;

service AnalysisService {
  rpc AnalyzeEmail(EmailRequest) returns (AnalyzeResponse);
}

message EmailRequest {
  string sender = 1;
  string subject = 2;
  string text_content = 3;
  repeated string urls = 4;
}

message AnalyzeResponse {
  string category = 1;           // "phishing" | "legitimate" | "spam_junk"
  string score_level = 2;        // "Low" | "Medium" | "High"
  int32 numeric_score = 3;       // 0-100
  string justification = 4;      // pipe-delimited summary
  string explanation_json = 5;   // JSON string of structured explanation
  string explanation_text = 6;   // human-readable paragraph
}
