<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PhishGuard{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Base Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col selection:bg-cyan-500 selection:text-white">
    <!-- Navigation -->
    <nav class="glass-panel sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2 group">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-white font-bold group-hover:shadow-[0_0_15px_rgba(34,211,238,0.6)] transition-all duration-300">
                            P
                        </div>
                        <span class="font-bold text-xl tracking-tight text-white">PhishGuard</span>
                    </a>
                </div>
                <div class="flex items-center gap-4" id="nav-menu">
                    <!-- Dynamic auth buttons injected via JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-slate-900/50 py-6 text-center text-slate-500 text-sm">
        Academic Project - MYP
    </footer>

    <!-- Auth JS logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const navMenu = document.getElementById('nav-menu');
            
            if (token) {
                navMenu.innerHTML = `
                    <a href="/dashboard" class="text-slate-300 hover:text-cyan-400 font-medium transition-colors">Dashboard</a>
                    <button onclick="logout()" class="ml-4 px-4 py-2 rounded-lg text-sm font-medium text-white bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all">Log out</button>
                `;
            } else {
                navMenu.innerHTML = `
                    <a href="/login" class="text-slate-300 hover:text-white font-medium transition-colors">Log in</a>
                    <a href="/register" class="ml-4 px-4 py-2 rounded-lg text-sm font-medium text-slate-900 bg-cyan-400 hover:bg-cyan-300 hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all">Sign up</a>
                `;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
