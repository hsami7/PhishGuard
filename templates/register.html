{% extends "base.html" %}

{% block title %}Sign up | PhishGuard{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)] py-12 px-4 sm:px-6 lg:px-8 relative">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    
    <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white tracking-tight">Create an account</h2>
            <p class="text-slate-400 mt-2 text-sm">Join PhishGuard today</p>
        </div>

        <div id="error-alert" class="hidden mb-4 p-3 rounded-lg bg-rose-500/20 border border-rose-500/50 text-rose-400 text-sm">
        </div>

        <div id="success-alert" class="hidden mb-4 p-3 rounded-lg bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 text-sm">
            Account created successfully! Redirecting to login...
        </div>

        <form id="register-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input id="username" type="text" required class="w-full px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-white placeholder-slate-500 transition-all outline-none" placeholder="Choose a username">
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email address</label>
                <input id="email" type="email" required class="w-full px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-white placeholder-slate-500 transition-all outline-none" placeholder="you@example.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input id="password" type="password" required class="w-full px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-white placeholder-slate-500 transition-all outline-none" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold text-slate-900 bg-cyan-400 hover:bg-cyan-300 hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all duration-300">
                Sign up
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-400">
            Already have an account? <a href="/login" class="text-cyan-400 hover:text-cyan-300 font-medium">Log in</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const errorAlert = document.getElementById('error-alert');
        const successAlert = document.getElementById('success-alert');
        
        errorAlert.classList.add('hidden');
        successAlert.classList.add('hidden');

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                successAlert.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } else {
                const data = await res.json();
                errorAlert.textContent = data.detail || 'Registration failed';
                errorAlert.classList.remove('hidden');
            }
        } catch (err) {
            errorAlert.textContent = 'Server error. Please try again.';
            errorAlert.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
